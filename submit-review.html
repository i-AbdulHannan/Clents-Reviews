<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit review · reviews</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="script.js" defer></script>
</head>
<body class="bg-black text-white">

<!-- PRELOADER (same) -->
<div id="preloader"><div class="preloader-content"><div class="preloader-logo">reviews</div><div class="text-sm tracking-[0.3em] mt-4 text-gray-400">REPUTATION ENGINE</div></div></div>

<header class="glass-header py-5 px-6 md:px-12 flex justify-between items-center">
  <div class="text-2xl font-bold tracking-tight">reviews<span class="text-blue-600">.</span></div>
  <nav class="hidden md:flex gap-8 text-sm font-medium">
    <a href="index.html" class="hover:text-blue-500">Reviews</a>
    <a href="submit-review.html" class="hover:text-blue-500">Submit</a>
    <a href="admin-login.html" class="hover:text-blue-500">Admin</a>
  </nav>
  <div id="hamburger" class="md:hidden hamburger"><span></span><span></span><span></span></div>
</header>
<div id="mobileNav" class="mobile-nav"><nav class="flex flex-col gap-6 text-2xl mt-16"><a href="index.html">Reviews</a><a href="submit-review.html">Submit</a><a href="admin-login.html">Admin</a></nav></div>

<main class="max-w-2xl mx-auto px-6 py-20">
  <h2 class="text-5xl font-bold mb-4">Leave a review</h2>
  <p class="text-gray-400 mb-12">No login required · instant & secure</p>

  <form id="submitReviewForm" class="space-y-10">
    <!-- floating name -->
    <div class="floating-group">
      <input type="text" id="name" placeholder=" " required>
      <label for="name">Full name *</label>
      <span class="border-highlight"></span>
    </div>
    <div class="floating-group">
      <input type="text" id="company" placeholder=" ">
      <label for="company">Company (optional)</label>
      <span class="border-highlight"></span>
    </div>
    <!-- star rating interactive -->
    <div class="mb-6">
      <p class="text-sm text-gray-400 mb-2">Rating *</p>
      <div class="star-rating flex gap-3 text-4xl">
        <span class="star-empty cursor-pointer">★</span>
        <span class="star-empty cursor-pointer">★</span>
        <span class="star-empty cursor-pointer">★</span>
        <span class="star-empty cursor-pointer">★</span>
        <span class="star-empty cursor-pointer">★</span>
      </div>
    </div>
    <div class="floating-group">
      <textarea id="message" rows="3" placeholder=" " required></textarea>
      <label for="message">Review message *</label>
      <span class="border-highlight"></span>
    </div>

    <button type="submit" class="btn-primary w-full py-4 text-lg">Submit review →</button>
  </form>
</main>

<footer class="premium-footer py-8 px-6 text-center text-gray-500">© 2026 reviews for | Abdul Hannan</footer>
</body>
</html>
