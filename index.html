<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clients reviews | Abdul Hannan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="script.js" defer></script>
</head>
<body class="bg-black text-white">

<!-- PRELOADER -->
<div id="preloader">
  <div class="preloader-content">
    <div class="preloader-logo">reviews</div>
    <div class="text-sm tracking-[0.3em] mt-4 text-gray-400">REPUTATION ENGINE</div>
  </div>
</div>

<!-- GLASS HEADER -->
<header class="glass-header py-5 px-6 md:px-12 flex justify-between items-center z-50">
  <div class="text-2xl font-bold tracking-tight">reviews<span class="text-blue-600">.</span></div>
  <nav class="hidden md:flex gap-8 text-sm font-medium">
    <a href="index.html" class="hover:text-blue-500 transition">Reviews</a>
    <a href="submit-review.html" class="hover:text-blue-500 transition">Submit</a>
    <a href="admin-login.html" class="hover:text-blue-500 transition">Admin</a>
  </nav>
  <div id="hamburger" class="md:hidden hamburger">
    <span></span><span></span><span></span>
  </div>
</header>

<!-- MOBILE NAV -->
<div id="mobileNav" class="mobile-nav">
  <nav class="flex flex-col gap-6 text-2xl mt-16">
    <a href="index.html">Reviews</a>
    <a href="submit-review.html">Submit</a>
    <a href="admin-login.html">Admin</a>
  </nav>
</div>

<main class="max-w-7xl mx-auto px-4 md:px-8 py-12">
  <!-- hero -->
  <section class="text-center mb-20">
    <h1 class="text-6xl md:text-8xl font-black tracking-tight leading-[0.9] bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">Client Trust.<br>Proven Results.</h1>
    <div class="summary-card inline-flex gap-8 mt-10 p-6">
      <div><span class="avg-rating text-6xl font-black">4.8</span> <span class="text-gray-400">/5</span></div>
      <div class="text-left">
        <div class="text-2xl font-bold"><span class="total-reviews-count">12</span> reviews</div>
        <div class="flex gap-1 text-blue-500 text-xl">★★★★★</div>
      </div>
    </div>
  </section>

  <!-- REVIEW GRID -->
  <div id="public-review-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

  <!-- CTA -->
  <div class="text-center my-20">
    <a href="submit-review.html" class="btn-primary inline-block text-lg">Submit your review →</a>
  </div>
</main>

<!-- PREMIUM FOOTER -->
<footer class="premium-footer py-12 px-6 text-gray-400">
  <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between">
    <div class="text-3xl font-black text-white mb-6">reviews<span class="text-blue-600">.</span></div>
    <div class="text-sm">© 2026 reviews for | Abdul Hannan</div>
  </div>
</footer>
</body>
</html>
