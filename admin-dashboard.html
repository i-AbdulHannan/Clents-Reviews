<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin dashboard · reviews</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="script.js" defer></script>
</head>
<body class="bg-black text-white flex">

<div id="preloader"><div class="preloader-content"><div class="preloader-logo">reviews</div></div></div>

<!-- SIDEBAR -->
<aside class="dashboard-sidebar hidden md:flex flex-col p-8 min-h-screen">
  <div class="text-3xl font-black mb-12">reviews<span class="text-blue-600">.</span></div>
  <nav class="flex flex-col gap-6 text-sm">
    <a href="index.html" class="text-gray-400 hover:text-white transition">Public view</a>
    <a href="#" class="text-white font-semibold border-l-4 border-blue-600 pl-3">Dashboard</a>
    <a href="submit-review.html" class="text-gray-400 hover:text-white">+ New review</a>
  </nav>
</aside>

<!-- MAIN -->
<main class="dashboard-main flex-1 p-6 md:p-10">
  <div class="flex justify-between items-center mb-10">
    <h1 class="text-3xl font-bold">Review manager</h1>
    <div class="flex gap-2">
      <button data-filter="all" class="filter-btn active px-4 py-2 rounded-full border border-gray-700 text-sm">All</button>
      <button data-filter="approved" class="filter-btn px-4 py-2 rounded-full border border-gray-700 text-sm">Approved</button>
      <button data-filter="hidden" class="filter-btn px-4 py-2 rounded-full border border-gray-700 text-sm">Hidden</button>
    </div>
  </div>

  <!-- reviews table -->
  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="text-left text-gray-400 border-b border-gray-800">
        <tr><th class="pb-3">Name</th><th>Company</th><th>Rating</th><th>Message</th><th>Date</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody id="admin-reviews-body"></tbody>
    </table>
  </div>
</main>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal-overlay hidden fixed inset-0 flex items-center justify-center z-50">
  <div class="modal-card p-8">
    <h3 class="text-2xl font-bold mb-4">Delete review?</h3>
    <p class="text-gray-400 mb-6">This action cannot be undone.</p>
    <div class="flex gap-4">
      <button id="confirmDelete" class="bg-red-600 px-6 py-2 rounded-full">Delete</button>
      <button id="cancelDelete" class="border border-gray-600 px-6 py-2 rounded-full">Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
