<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login · reviews</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="script.js" defer></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">

<div id="preloader"><div class="preloader-content"><div class="preloader-logo">reviews</div><div class="text-sm">ADMIN</div></div></div>

<div class="w-full max-w-md p-8">
  <div class="text-center mb-10">
    <div class="text-5xl font-black">reviews<span class="text-blue-600">.</span></div>
    <p class="text-gray-400 mt-2">admin access only</p>
  </div>
  <form id="adminLoginForm" class="bg-[#111] p-8 rounded-3xl border border-gray-800 shadow-2xl">
    <div class="floating-group">
      <input type="text" id="username" placeholder=" " required>
      <label for="username">Username</label>
      <span class="border-highlight"></span>
    </div>
    <div class="floating-group">
      <input type="password" id="password" placeholder=" " required>
      <label for="password">Password</label>
      <span class="border-highlight"></span>
    </div>
    <button type="submit" class="btn-primary w-full mt-4">Login →</button>
    <p class="text-xs text-gray-600 mt-6 text-center">demo: admin / admin</p>
  </form>
</div>
</body>
</html>
